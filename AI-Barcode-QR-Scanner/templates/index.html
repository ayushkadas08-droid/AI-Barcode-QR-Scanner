<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Barcode and QR Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<main class="page">
    <header class="topbar">
        <div class="brand">AI Barcode and QR Scanner</div>
        <nav class="nav">
            <a class="button secondary" href="{{ url_for('history') }}">History</a>
            <a class="button secondary" href="{{ url_for('webcam') }}">Webcam</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>Scan, classify, and check QR codes or barcodes.</h1>
            <p>
                Upload an image to decode the code, analyze safety risks, classify the content,
                and get an AI-assisted recommendation.
            </p>
        </div>

        <div class="panel">
            <h2>Upload Image</h2>
            <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
                <input type="file" name="image" accept="image/*" required>
                <div class="actions">
                    <button type="submit">Upload and Scan</button>
                    <a class="button secondary" href="{{ url_for('history') }}">View History</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
